<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>

<title>Mama's Meal Prep Planner</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Georgia,serif;background:#faf9f6;min-height:100vh;}
button{font-family:Georgia,serif;cursor:pointer;}
.hdr{background:linear-gradient(135deg,#92400e 0%,#d97706 100%);color:white;padding:22px 18px 16px;}
.hdr-inner{max-width:900px;margin:0 auto;}
.hdr-top{display:flex;justify-content:space-between;align-items:flex-start;}
.hdr-eyebrow{font-size:10px;letter-spacing:3px;text-transform:uppercase;opacity:.7;margin-bottom:3px;}
.hdr-title{font-size:24px;font-weight:800;line-height:1.2;}
.btn-hist{background:rgba(255,255,255,.2);border:none;border-radius:12px;padding:8px 14px;color:white;font-size:12px;font-weight:700;white-space:nowrap;margin-top:2px;}
.week-nav{margin-top:14px;display:flex;align-items:center;gap:10px;}
.btn-wk{background:rgba(255,255,255,.2);border:none;border-radius:10px;width:32px;height:32px;color:white;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.wk-lbl{background:rgba(255,255,255,.15);border-radius:12px;padding:8px 14px;flex:1;text-align:center;}
.wk-main{font-size:13px;font-weight:800;}
.wk-sub{font-size:11px;opacity:.8;margin-top:2px;}
.prog-row{margin-top:12px;display:flex;align-items:center;gap:10px;}
.prog-bg{flex:1;height:5px;background:rgba(255,255,255,.25);border-radius:99px;}
.prog-fill{height:100%;background:white;border-radius:99px;transition:width .4s ease;}
.prog-txt{font-size:11px;font-weight:700;opacity:.9;white-space:nowrap;}
.tabs{background:white;border-bottom:2px solid #f0ebe3;position:sticky;top:0;z-index:40;}
.tabs-inner{max-width:900px;margin:0 auto;display:flex;padding:0 8px;}
.tab{padding:13px 12px;border:none;background:none;font-size:13px;font-weight:700;color:#78716c;border-bottom:3px solid transparent;transition:all .2s;flex:1;text-align:center;}
.tab.on{color:#b45309;border-bottom-color:#d97706;}
.content{max-width:900px;margin:0 auto;padding:18px 14px 40px;}
.hint{font-size:12px;color:#a8a29e;margin-bottom:12px;}
.day-card{background:white;border-radius:18px;padding:14px;box-shadow:0 1px 6px rgba(0,0,0,.05);border:1px solid #f0ebe3;margin-bottom:12px;}
.day-name{font-size:14px;font-weight:800;color:#292524;margin-bottom:10px;}
.meal-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.meal-cell{min-height:66px;border-radius:13px;border:2px dashed #e7e0d6;background:#faf9f6;padding:9px;cursor:pointer;transition:all .18s;display:flex;flex-direction:column;gap:4px;}
.meal-cell:hover{border-color:#d97706!important;background:#fffbeb!important;}
.meal-cell.filled{background:#fffcf5;}
.mt-tag{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;padding:2px 7px;border-radius:99px;width:fit-content;}
.meal-val{font-size:12px;font-weight:700;color:#292524;line-height:1.3;}
.meal-ph{font-size:11px;color:#c4b9ac;margin:auto;text-align:center;width:100%;}
.chkbox{width:20px;height:20px;border-radius:6px;border:2px solid #d6d3d1;background:white;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;font-size:11px;font-weight:900;color:white;}
.chkbox.on{border-color:#d97706;background:#d97706;}
.groc-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.groc-cnt{font-size:13px;color:#78716c;}
.btn-rst{background:none;border:none;color:#d97706;font-size:12px;font-weight:700;}
.groc-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:12px;cursor:pointer;background:white;border:1px solid #f0ebe3;margin-bottom:4px;transition:all .15s;}
.groc-item.on{background:#faf9f6;}
.groc-lbl{font-size:13px;color:#44403c;}
.groc-lbl.on{color:#a8a29e;text-decoration:line-through;}
.budget-box{margin-top:10px;padding:14px 16px;border-radius:16px;background:#fffbeb;border:1px solid #fde68a;}
.budget-lbl{font-size:11px;font-weight:800;color:#b45309;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
.budget-txt{font-size:12px;color:#92400e;}
.pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
.pill{padding:6px 14px;border-radius:99px;border:none;font-size:12px;font-weight:700;background:#f0ebe3;color:#78716c;transition:all .15s;}
.pill.on{background:#d97706;color:white;}
.pill-upload{background:white;border:1.5px dashed #d97706;color:#d97706;padding:6px 14px;border-radius:99px;font-size:12px;font-weight:700;transition:all .15s;}
.rec-count-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.rec-count-txt{font-size:12px;color:#a8a29e;}
.rec-up-badge{font-size:11px;padding:3px 10px;border-radius:99px;background:#ede9fe;color:#7c3aed;font-weight:700;}
.rec-card{background:white;border-radius:18px;border:1.5px solid #f0ebe3;overflow:hidden;transition:border-color .2s;box-shadow:0 1px 4px rgba(0,0,0,.04);margin-bottom:10px;}
.rec-card.open{border-color:#d97706;box-shadow:0 4px 16px rgba(217,119,6,.1);}
.rec-hdr{padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:10px;background:white;user-select:none;}
.rec-card.open .rec-hdr{background:#fffcf5;}
.rec-arrow{width:26px;height:26px;border-radius:8px;background:#f0ebe3;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;font-size:11px;color:#78716c;}
.rec-card.open .rec-arrow{background:#d97706;color:white;transform:rotate(90deg);}
.rec-info{flex:1;min-width:0;}
.rec-name-row{display:flex;align-items:center;gap:6px;}
.rec-name{font-weight:800;font-size:14px;color:#292524;line-height:1.2;}
.rec-meta{display:flex;gap:8px;margin-top:4px;flex-wrap:wrap;align-items:center;}
.rec-meta-txt{font-size:11px;color:#a8a29e;}
.cat-tag{font-size:10px;padding:2px 8px;border-radius:99px;font-weight:700;text-transform:capitalize;}
.up-badge{font-size:9px;padding:2px 6px;border-radius:99px;background:#ede9fe;color:#7c3aed;font-weight:800;text-transform:uppercase;letter-spacing:.5px;}
.rec-steps{padding:0 16px 18px;border-top:1px solid #f0ebe3;}
.no-recipe-section{background:#fff7ed;border:1.5px solid #fed7aa;border-radius:14px;padding:12px 14px;margin-bottom:14px;}
.no-recipe-lbl{font-size:11px;font-weight:800;color:#c2410c;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
.no-recipe-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;}
.no-recipe-name{font-size:13px;font-weight:700;color:#292524;}
.no-recipe-pill{font-size:10px;font-weight:800;padding:3px 10px;border-radius:99px;background:#fee2e2;color:#dc2626;border:1px solid #fca5a5;white-space:nowrap;}
.rec-section-lbl{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:#b45309;margin:14px 0 8px;}
.ingr-list{display:flex;flex-direction:column;gap:5px;margin-bottom:4px;}
.ingr-row{display:flex;align-items:flex-start;gap:8px;font-size:13px;color:#44403c;line-height:1.5;}
.ingr-dot{flex-shrink:0;width:6px;height:6px;border-radius:50%;background:#d97706;margin-top:6px;}
.ingr-divider{border:none;border-top:1px solid #f0ebe3;margin:12px 0 0;}
.steps-list{margin-top:14px;display:flex;flex-direction:column;gap:10px;}
.step-row{display:flex;gap:12px;align-items:flex-start;}
.step-num{flex-shrink:0;width:24px;height:24px;border-radius:50%;background:#fffbeb;border:1.5px solid #fde68a;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:#b45309;}
.step-txt{font-size:13px;color:#44403c;line-height:1.6;padding-top:2px;}
.btn-del{padding:4px 10px;border-radius:8px;border:1.5px solid #fca5a5;background:white;color:#ef4444;font-size:11px;font-weight:700;flex-shrink:0;}
.btn-edit{padding:4px 10px;border-radius:8px;border:1.5px solid #fed7aa;background:white;color:#d97706;font-size:11px;font-weight:700;flex-shrink:0;}
.rec-btn-group{display:flex;gap:6px;flex-shrink:0;}
.edit-modal{background:white;border-radius:24px;padding:24px;width:min(520px,calc(100vw - 32px));max-height:90vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.25);display:flex;flex-direction:column;gap:14px;}
.edit-field-lbl{font-size:11px;font-weight:800;color:#b45309;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;}
.edit-inp{width:100%;padding:9px 12px;border-radius:10px;border:1.5px solid #e7e0d6;font-size:13px;font-family:Georgia,serif;outline:none;color:#292524;background:white;transition:border-color .2s;}
.edit-inp:focus{border-color:#d97706;}
.edit-select{width:100%;padding:9px 12px;border-radius:10px;border:1.5px solid #e7e0d6;font-size:13px;font-family:Georgia,serif;outline:none;color:#292524;background:white;cursor:pointer;}
.edit-ta{width:100%;padding:9px 12px;border-radius:10px;border:1.5px solid #e7e0d6;font-size:12px;font-family:Georgia,serif;outline:none;color:#292524;background:white;resize:vertical;line-height:1.7;transition:border-color .2s;}
.edit-ta:focus{border-color:#d97706;}
.edit-hint{font-size:11px;color:#a8a29e;margin-top:4px;}
.edit-title{font-size:20px;font-weight:800;color:#292524;}
.edit-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.edit-name-warn{font-size:11px;color:#d97706;margin-top:3px;display:none;}
.edit-name-warn.show{display:block;}
.empty{text-align:center;padding:48px 0;color:#a8a29e;}
.empty-icon{font-size:40px;margin-bottom:12px;}
.empty-txt{font-size:13px;}
.overlay{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.5);backdrop-filter:blur(6px);}
.overlay.bottom{align-items:flex-end;}
.modal{background:white;border-radius:24px;padding:24px;width:340px;max-height:88vh;overflow-y:auto;overflow-x:hidden;box-shadow:0 24px 60px rgba(0,0,0,.25);display:flex;flex-direction:column;gap:14px;}
.modal.wide{width:390px;max-height:92vh;}
.modal.sheet{border-radius:24px 24px 0 0;width:100%;max-width:900px;max-height:85vh;box-shadow:0 -8px 40px rgba(0,0,0,.2);}
.picker-eyebrow{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:#a8a29e;margin-bottom:2px;}
.picker-title{font-size:20px;font-weight:800;color:#292524;text-transform:capitalize;}
.search-box{background:#fffbeb;border-radius:14px;padding:12px;border:1px solid #fde68a;}
.search-lbl{font-size:11px;font-weight:700;color:#b45309;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
.search-row{display:flex;gap:8px;}
.search-inp{flex:1;padding:9px 12px;border-radius:10px;border:1.5px solid #fed7aa;font-size:13px;font-family:Georgia,serif;outline:none;color:#292524;background:white;}
.btn-plus{padding:9px 16px;border-radius:10px;background:#d97706;color:white;border:none;font-weight:800;font-size:15px;}
.search-hint{font-size:11px;color:#a8a29e;margin-top:6px;}
.sugg-lbl{font-size:11px;font-weight:700;color:#78716c;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
.sugg-btn{text-align:left;padding:11px 14px;border-radius:12px;border:1.5px solid #f0ebe3;background:#faf9f6;color:#292524;font-size:13px;font-weight:600;font-family:Georgia,serif;transition:all .15s;width:100%;margin-bottom:6px;}
.sugg-btn.on{border-color:#d97706;background:#fffbeb;color:#b45309;}
.btn-remove{padding:10px 14px;border-radius:12px;border:1.5px dashed #fca5a5;background:white;color:#ef4444;font-size:13px;font-weight:600;}
.btn-close-sm{background:none;border:none;color:#a8a29e;font-size:13px;padding-top:4px;}
.fmt-guide{background:#fffbeb;border-radius:14px;padding:12px;border:1px solid #fde68a;}
.fmt-lbl{font-size:11px;font-weight:800;color:#b45309;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
.fmt-pre{font-size:11px;color:#92400e;line-height:1.7;font-family:monospace;white-space:pre-wrap;}
.btn-file{width:100%;padding:10px 14px;border-radius:12px;border:1.5px dashed #d6d3d1;background:#faf9f6;color:#78716c;font-size:13px;font-weight:700;}
.divider{font-size:11px;color:#a8a29e;text-align:center;margin:4px 0;}
.upload-ta{width:100%;min-height:260px;height:260px;max-height:50vh;padding:10px 12px;border-radius:12px;border:1.5px solid #e7e0d6;font-size:12px;font-family:monospace;resize:vertical;outline:none;color:#292524;line-height:1.6;overflow-y:auto;box-sizing:border-box;}
.err-txt{font-size:12px;color:#ef4444;font-weight:600;}
.preview-box{background:#f0fdf4;border-radius:14px;padding:12px;border:1px solid #bbf7d0;}
.preview-lbl{font-size:11px;font-weight:800;color:#15803d;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
.preview-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid #dcfce7;}
.preview-name{font-size:13px;font-weight:700;color:#292524;}
.preview-meta{font-size:11px;color:#78716c;}
.btn-row{display:flex;gap:8px;}
.btn-primary{flex:1;padding:12px;border-radius:12px;border:none;background:#d97706;color:white;font-size:14px;font-weight:800;}
.btn-primary:disabled{background:#e7e0d6;cursor:default;}
.btn-secondary{padding:12px 16px;border-radius:12px;border:1.5px solid #e7e0d6;background:white;color:#78716c;font-size:13px;font-weight:700;}
.hist-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.hist-title{font-size:20px;font-weight:800;color:#292524;}
.btn-x{background:none;border:none;font-size:22px;color:#78716c;line-height:1;}
.hist-week{border-radius:16px;border:1.5px solid #f0ebe3;overflow:hidden;margin-bottom:10px;transition:border-color .2s;}
.hist-week.open{border-color:#d97706;}
.hist-wk-hdr{padding:14px 18px;cursor:pointer;background:white;display:flex;justify-content:space-between;align-items:center;}
.hist-week.open .hist-wk-hdr{background:#fffbeb;}
.hist-wk-lbl{font-weight:800;font-size:14px;color:#292524;}
.hist-wk-body{padding:4px 18px 18px;border-top:1px solid #f0ebe3;background:#fffcf8;}
.hist-day-lbl{font-size:11px;font-weight:800;color:#78716c;text-transform:uppercase;letter-spacing:1px;margin:14px 0 6px;}
.hist-tags{display:flex;flex-wrap:wrap;gap:6px;}
.hist-tag{font-size:12px;padding:4px 10px;border-radius:99px;font-weight:700;}
@media(max-width:480px){.modal,.modal.wide{width:calc(100vw - 32px);}}
</style>
</head>
<body>
<div id="app"></div>
<script>
// в”Җв”Җ DATA в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const DAYS=["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
const MEAL_TYPES=["breakfast","lunch","dinner","snacks"];
const MEAL_IDEAS={
  breakfast:["Overnight Oats","Scrambled Eggs & Toast","Pancakes","Yogurt Parfait","Breakfast Burritos","Smoothie Bowls","French Toast"],
  lunch:["Turkey Wraps","Mac & Cheese","Grilled Cheese + Soup","Quesadillas","PB&J + Fruit","Pasta Salad","Rice Bowls"],
  dinner:["Spaghetti & Meatballs","Sheet Pan Chicken","Taco Night","Slow Cooker Chili","Stir Fry","Baked Ziti","BBQ Chicken"],
  snacks:["Apple Slices + PB","Cheese & Crackers","Veggies + Hummus","Trail Mix","Fruit Cups","Popcorn","Yogurt Tubes"]
};
const BUDGET_TIPS=[
  "Buy proteins in bulk & freeze in meal-size portions",
  "Shop store-brand staples: pasta, rice, canned goods",
  "Plan around weekly sales & seasonal produce",
  "Prep double batches вҖ” freeze half for next week",
  "Use leftover proteins across multiple meals",
  "Eggs are your best friend: cheap, fast, versatile"
];
const TC={breakfast:{bg:"#fef3c7",text:"#b45309"},lunch:{bg:"#e0f2fe",text:"#0369a1"},dinner:{bg:"#ffe4e6",text:"#be123c"},snacks:{bg:"#dcfce7",text:"#15803d"}};
const RECIPES={
  "Overnight Oats":{tag:"breakfast",time:"5 min + overnight",servings:5,ingredients:["2ВҪ cups rolled oats","2ВҪ cups milk","1Вј cups Greek yogurt","5 tsp honey","Pinch of salt","Fresh berries (for topping)"],steps:["Measure ВҪ cup rolled oats per jar (5 jars total).","Add ВҪ cup milk and Вј cup Greek yogurt to each jar.","Stir in 1 tsp honey and a pinch of salt.","Seal jars and refrigerate overnight (at least 6 hours).","In the morning, top with fresh berries and serve cold."]},
  "Scrambled Eggs & Toast":{tag:"breakfast",time:"10 min",servings:5,ingredients:["10 eggs","5 slices bread","2ВҪ tbsp butter","Salt & pepper to taste"],steps:["Crack 2 eggs per person into a bowl, season with salt & pepper, and whisk until combined.","Melt ВҪ tbsp butter in a non-stick skillet over medium-low heat.","Pour in eggs and let sit 10 seconds, then gently fold with a spatula every few seconds.","Remove from heat just before fully set вҖ” residual heat finishes them.","While eggs cook, toast bread and spread with butter. Plate together and serve immediately."]},
  "Pancakes":{tag:"breakfast",time:"25 min",servings:5,ingredients:["2 cups pancake mix","1ВҪ cups milk","2 eggs","Butter (for griddle)","Maple syrup (for serving)"],steps:["Combine 2 cups pancake mix, 1ВҪ cups milk, and 2 eggs in a large bowl. Stir until just combined вҖ” lumps are okay.","Heat a griddle or non-stick pan over medium heat; lightly butter the surface.","Pour Вј cup batter per pancake. Cook until bubbles form on the surface and edges look set, about 2вҖ“3 min.","Flip and cook another 1вҖ“2 min until golden. Repeat with remaining batter.","Stack cooled extras between sheets of parchment, place in a zip bag, and freeze for quick weekday breakfasts."]},
  "Yogurt Parfait":{tag:"breakfast",time:"5 min",servings:5,ingredients:["2ВҪ cups Greek yogurt","1 cup + 3 tbsp granola","1ВҪ cups fresh or thawed berries","Honey (for drizzling)"],steps:["Spoon ВҪ cup Greek yogurt into the bottom of each cup or jar.","Add a layer of granola (about 3 tbsp per cup) on top of the yogurt.","Layer fresh or thawed berries over the granola.","Repeat yogurt and granola layers if the container is tall enough.","Drizzle with honey and serve immediately, or refrigerate (un-topped) for up to 2 days."]},
  "Breakfast Burritos":{tag:"breakfast",time:"20 min",servings:5,ingredients:["10 eggs","ВҪ lb breakfast sausage or bacon","5 large flour tortillas","1 cup shredded cheese","Salsa to taste","Salt, pepper, splash of milk"],steps:["Scramble 10 eggs in a large skillet with salt, pepper, and a splash of milk. Set aside.","Cook ВҪ lb breakfast sausage or bacon in the same pan; crumble and drain excess fat.","Warm flour tortillas one at a time in a dry skillet for 20 seconds per side.","Layer eggs, meat, shredded cheese, and salsa down the center of each tortilla.","Fold sides in, then roll tightly. Wrap individually in foil and refrigerate or freeze.","Reheat from frozen: unwrap foil, microwave 2вҖ“3 min, flipping halfway through."]},
  "Smoothie Bowls":{tag:"breakfast",time:"10 min",servings:5,ingredients:["2 cups frozen mixed berries","1 frozen banana","ВҪ cup Greek yogurt","Granola (for topping)","Fresh fruit slices (for topping)","Coconut flakes & honey (for topping)"],steps:["Blend 2 cups frozen berries, 1 frozen banana, and ВҪ cup Greek yogurt until thick and smooth вҖ” use minimal liquid.","Pour into bowls; the consistency should be thick enough to hold toppings.","Top with granola, fresh fruit slices, coconut flakes, and a drizzle of honey.","Serve immediately вҖ” smoothie bowls melt quickly!"]},
  "French Toast":{tag:"breakfast",time:"20 min",servings:5,ingredients:["4 eggs","ВҪ cup milk","1 tsp vanilla extract","1 tsp cinnamon","Pinch of salt","8вҖ“10 slices thick bread","2 tbsp butter","Maple syrup & powdered sugar (for serving)"],steps:["Whisk together 4 eggs, ВҪ cup milk, 1 tsp vanilla, 1 tsp cinnamon, and a pinch of salt in a shallow dish.","Melt 1 tbsp butter in a large skillet over medium heat.","Dip bread slices in the egg mixture, letting each side soak for 10вҖ“15 seconds.","Cook in batches, 2вҖ“3 min per side, until golden brown. Add more butter between batches.","Serve with maple syrup and powdered sugar, or freeze extras for quick reheating."]},

function getMonday(off){const n=new Date(),m=new Date(n);m.setDate(n.getDate()-((n.getDay()+6)%7)+off*7);m.setHours(0,0,0,0);return m;}

function weekLabel(off){const m=getMonday(off),s=new Date(m);s.setDate(m.getDate()+6);const f=d=>d.toLocaleDateString("en-US",{month:"short",day:"numeric"});return `${f(m)} вҖ“ ${f(s)}`;}

// Maps unicode/word fractions to decimal
const FRAC={
  "ВҪ":0.5,"в…“":1/3,"в…”":2/3,"Вј":0.25,"Вҫ":0.75,
  "в…ӣ":0.125,"в…ң":0.375,"в…қ":0.625,"в…һ":0.875,
  "1/2":0.5,"1/3":1/3,"2/3":2/3,"1/4":0.25,"3/4":0.75,
  "1/8":0.125,"3/8":0.375,"5/8":0.625,"7/8":0.875
};
// Canonical unit aliases вҶ’ standard label
const UNIT_ALIAS={
  cup:"cup",cups:"cup",c:"cup",
  tablespoon:"tbsp",tablespoons:"tbsp",tbsp:"tbsp",tbs:"tbsp",tb:"tbsp",
  teaspoon:"tsp",teaspoons:"tsp",tsp:"tsp",
  pound:"lb",pounds:"lb",lb:"lb",lbs:"lb",
  ounce:"oz",ounces:"oz",oz:"oz",
  clove:"clove",cloves:"clove",
  slice:"slice",slices:"slice",
  can:"can",cans:"can",
  jar:"jar",jars:"jar",
  packet:"packet",packets:"packet",
  stalk:"stalk",stalks:"stalk",
  bag:"bag",bags:"bag",
  container:"container",containers:"container",
  multipack:"multipack",
  head:"head",heads:"head",
  bunch:"bunch",bunches:"bunch",
};
// Words that are notes/qualifiers, not ingredient names
const STOP=new Set(["to","taste","optional","for","topping","serving","as","needed","divided","of","cooked","shredded","diced","sliced","minced","cubed","halved","chopped","frozen","thawed","warm","large","medium","small","extra","fresh","dry","dried","bonein","boneless","lean","low","fat","sodium","free","or","and","plus","little","a","an","the","approximately","approx"]);
 
function parseFrac(s){
  // returns numeric value for a string like "1ВҪ", "2/3", "1 1/2", "ВҪ", "3", etc.
  if(!s)return null;
  s=s.trim();
  // try direct frac lookup
  if(FRAC[s]!==undefined)return FRAC[s];
  // whole number
  if(/^\d+$/.test(s))return parseFloat(s);
  // decimal
  if(/^\d+\.\d+$/.test(s))return parseFloat(s);
  // "1ВҪ" or "2в…“" вҖ” whole + unicode frac
  const muf=s.match(/^(\d+)\s*([\u00BC-\u00BE\u2150-\u215EВҪв…“в…”ВјВҫв…ӣв…ңв…қв…һ]+)$/);
  if(muf&&FRAC[muf[2]]!==undefined)return parseInt(muf[1])+FRAC[muf[2]];
  // "1 1/2" вҖ” whole + slash frac
  const msf=s.match(/^(\d+)\s+(\d+\/\d+)$/);
  if(msf&&FRAC[msf[2]]!==undefined)return parseInt(msf[1])+FRAC[msf[2]];
  // plain slash frac
  const sf=s.match(/^(\d+)\/(\d+)$/);
  if(sf)return parseInt(sf[1])/parseInt(sf[2]);
  return null;
}
 
function formatQty(n){
  if(n===null||n===undefined)return"";
  const FRAC_STRS={"0.5":"ВҪ","0.3333":"в…“","0.6667":"в…”","0.25":"Вј","0.75":"Вҫ","0.125":"в…ӣ","0.375":"в…ң","0.625":"в…қ","0.875":"в…һ"};
  const FRAC_VALS=[0.5,1/3,2/3,0.25,0.75,0.125,0.375,0.625,0.875];
  const whole=Math.floor(n);const rem=n-whole;
  for(const v of FRAC_VALS){
    if(Math.abs(rem-v)<0.02){
      const key=v===1/3?"0.3333":v===2/3?"0.6667":String(v);
      const fracStr=FRAC_STRS[key];
      if(fracStr)return whole>0?`${whole}${fracStr}`:fracStr;
    }
  }
  if(Number.isInteger(n))return String(n);
  return parseFloat(n.toFixed(2)).toString();
}
 
function normalizeIngredientName(raw){
  // strip leading quantity+unit tokens to get just the ingredient name
  let s=raw.trim();
  // remove range like "1вҖ“2" or "2-3"
  s=s.replace(/^\d+[\вҖ“\-]\d+\s*/,"");
  // remove leading qty (incl fractions)
  s=s.replace(/^([\dВҪв…“в…”ВјВҫв…ӣв…ңв…қв…һ][0-9\s\/ВҪв…“в…”ВјВҫв…ӣв…ңв…қв…һ]*)\s*/,"");
  // remove leading unit
  const unitRe=new RegExp("^("+Object.keys(UNIT_ALIAS).join("|")+")[s]?\\b\\.?\\s*","i");
  s=s.replace(unitRe,"");
  // remove parenthetical notes like "(10.75 oz each)" or "(for serving)"
  s=s.replace(/\(.*?\)/g,"").trim();
  // remove trailing comma-separated qualifiers like ", diced" ", minced"
  s=s.replace(/,.*$/,"").trim();
  // lowercase, collapse spaces
  s=s.toLowerCase().replace(/\s+/g," ").trim();
  // remove stop words that appear at start
  s=s.replace(/^(of|for|the|a|an)\s+/i,"");
  return s;
}
 
function parseIngredientLine(line){
  // Returns {qty, unit, name, raw} or null
  // Patterns: "1ВҪ cups rolled oats" | "10 eggs" | "Salt & pepper to taste" | "Butter (for griddle)"
  let s=line.trim();
  // Remove leading bullet if any
  s=s.replace(/^[-вҖў]\s*/,"");
  if(!s)return null;
 
  let qty=null,unit=null;
 
  // Try to extract leading number/fraction
  // Matches: "1ВҪ", "2ВҪ", "ВҪ", "1 1/2", "2/3", "1", "3.5"
  const qtyRe=/^([\dВҪв…“в…”ВјВҫв…ӣв…ңв…қв…һ]+(?:\s*[\d\/ВҪв…“в…”ВјВҫв…ӣв…ңв…қв…һ]+)?)\s*/;
  const qm=s.match(qtyRe);
  if(qm){
    const parsed=parseFrac(qm[1].trim());
    if(parsed!==null){qty=parsed;s=s.slice(qm[0].length);}
  }
 
  // Try to extract unit
  const unitRe=new RegExp("^("+Object.keys(UNIT_ALIAS).join("|")+")s?\\b\\.?\\s*","i");
  const um=s.match(unitRe);
  if(um){unit=UNIT_ALIAS[um[1].toLowerCase()]||um[1].toLowerCase();s=s.slice(um[0].length);}
 
  // Rest is ingredient name вҖ” clean it
  const raw=s.trim();
  // Remove parenthetical notes
  let name=raw.replace(/\(.*?\)/g,"").trim();
  // Remove trailing qualifiers after comma
  name=name.replace(/,.*$/,"").trim().toLowerCase();
  // Remove leading articles
  name=name.replace(/^(of|for|the|a|an)\s+/i,"").trim();
 
  if(!name)return null;
  return{qty,unit,name,raw:line.trim()};
}
 
function aggregateIngredients(mealNames){
  const allRecipes=Object.assign({},RECIPES,S.uploadedRecipes);
  // Map: normalizedName вҶ’ {qty, unit, display, recipes[]}
  const map={};
 
  mealNames.forEach(mealName=>{
    const recipe=allRecipes[mealName];
    if(!recipe||!recipe.ingredients)return;
    recipe.ingredients.forEach(line=>{
      const parsed=parseIngredientLine(line);
      if(!parsed)return;
      const key=parsed.name;
      if(!map[key]){
        map[key]={name:parsed.name,qty:null,unit:parsed.unit,rawLines:[],recipes:[]};
      }
      const entry=map[key];
      // Only add quantities if units are compatible (same unit or both unitless)
      if(parsed.qty!==null){
        const sameUnit=(entry.unit||null)===(parsed.unit||null);
        if(sameUnit){
          entry.qty=(entry.qty||0)+parsed.qty;
        } else if(entry.qty===null){
          entry.qty=parsed.qty;entry.unit=parsed.unit;
        } else {
          // Different units вҖ” just flag as "see recipes"
          entry.qty=null;entry.unit=null;entry.ambiguous=true;
        }
      }
      entry.rawLines.push(line);
      if(!entry.recipes.includes(mealName))entry.recipes.push(mealName);
    });
  });
 
  // Build display strings
  return Object.values(map).map(e=>{
    let display;
    if(e.ambiguous||e.qty===null){
      // Show the original lines joined, or just the name capitalized
      display=capitalize(e.name)+(e.rawLines.length>1?" (see recipes)":"");
    } else {
      const qStr=formatQty(e.qty);
      const uStr=e.unit?(e.qty>1&&e.unit!=="oz"&&e.unit!=="lb"?pluralUnit(e.unit):e.unit):"";
      display=(qStr?qStr+" ":"")+(uStr?uStr+" ":"")+capitalize(e.name);
    }
    return{key:e.name,display,recipes:e.recipes};
  }).sort((a,b)=>a.display.localeCompare(b.display));
}
 
function pluralUnit(u){
  const map={cup:"cups",tbsp:"tbsp",tsp:"tsp",lb:"lbs",oz:"oz",clove:"cloves",slice:"slices",can:"cans",jar:"jars",packet:"packets",stalk:"stalks",bag:"bags",container:"containers",head:"heads",bunch:"bunches"};
  return map[u]||u;
}
function capitalize(s){return s?s.charAt(0).toUpperCase()+s.slice(1):s;}

          <div class="edit-field-lbl">Cook Time</div>
          <input class="edit-inp" id="editTime" value="${esc(f.time)}" placeholder="e.g. 30 min"/>
        </div>
      </div>
      <div>
        <div class="edit-field-lbl">Servings</div>
        <input class="edit-inp" id="editServings" type="number" min="1" max="50" value="${esc(f.servings)}" style="width:100px"/>
      </div>
      <div>
        <div class="edit-field-lbl">Ingredients</div>
        <textarea class="edit-ta" id="editIngredients" rows="7" placeholder="One ingredient per line, e.g.:\n2 cups flour\n1 tsp salt\n3 eggs">${esc((f.ingredients||[]).join("\n"))}</textarea>
        <div class="edit-hint">One ingredient per line</div>
      </div>
      <div>
        <div class="edit-field-lbl">Preparation Steps</div>
        <textarea class="edit-ta" id="editSteps" rows="8" placeholder="One step per line, e.g.:\nPreheat oven to 375В°F\nMix dry ingredients\nBake for 25 minutes">${esc((f.steps||[]).join("\n"))}</textarea>
        <div class="edit-hint">One step per line вҖ” numbers are added automatically</div>
      </div>
      <div class="btn-row">
        <button class="btn-primary" id="btnEditSave">вң“ Save Changes</button>
        <button class="btn-secondary" id="btnEditCancel">Cancel</button>
      </div>
    </div>
  </div>`;
}
 
// в”Җв”Җ PARSE RECIPE TEXT в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function parseRecipes(text){
  const blocks=text.split(/\n{2,}/).map(b=>b.trim()).filter(Boolean);
  const out={};
  blocks.forEach(block=>{
    const lines=block.split("\n").map(l=>l.trim()).filter(Boolean);
    if(lines.length<2)return;
    const name=lines[0];let time="вҖ”",servings=5,tag="dinner";const steps=[];const ingredients=[];
    let inIngredients=false;
    lines.slice(1).forEach(line=>{
      const lo=line.toLowerCase();
      if(lo.startsWith("time:")){time=line.split(":").slice(1).join(":").trim();return;}
      if(lo.startsWith("serves:")||lo.startsWith("servings:")){servings=parseInt(line.split(":")[1])||5;return;}
      if(lo.startsWith("category:")||lo.startsWith("type:")||lo.startsWith("meal:")){
        const v=line.split(":")[1].trim().toLowerCase();
        if(["breakfast","lunch","dinner","snacks"].includes(v))tag=v;return;
      }
      if(lo==="ingredients"||lo==="ingredients:"){inIngredients=true;return;}
      if(lo==="preparation"||lo==="preparation:"||lo==="directions"||lo==="directions:"||lo==="steps"||lo==="steps:"){inIngredients=false;return;}
      const sm=line.match(/^\d+[\.\)]\s+(.+)/);
      if(sm){inIngredients=false;steps.push(sm[1]);return;}
      if(line.startsWith("-")||line.startsWith("вҖў")){
        const val=line.replace(/^[-вҖў]\s*/,"");
        if(inIngredients||!steps.length)ingredients.push(val);
        else steps.push(val);
        return;
      }
    });
    if(steps.length>0)out[name]={tag,time,servings,ingredients,steps,_uploaded:true};
  });
  return out;
}
 
// в”Җв”Җ BIND EVENTS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function bind(){
  // Tabs
  document.querySelectorAll("[data-tab]").forEach(b=>b.addEventListener("click",()=>{S.tab=b.dataset.tab;lsSet("s_tab",S.tab);render();}));
  // Week nav
  q("btnPrev",()=>{S.weekOffset--;lsSet("s_weekOffset",S.weekOffset);loadMeals();render();});
  q("btnNext",()=>{S.weekOffset++;lsSet("s_weekOffset",S.weekOffset);loadMeals();render();});
  // History
  q("btnHist",()=>{S.showHistory=true;render();});
  q("btnHistClose",()=>{S.showHistory=false;render();});
  ov("histOv",()=>{S.showHistory=false;render();});
  document.querySelectorAll("[data-hk]").forEach(el=>el.addEventListener("click",()=>{S.historyOpen[el.dataset.hk]=!S.historyOpen[el.dataset.hk];render();}));
  // Meal cells
  document.querySelectorAll(".meal-cell").forEach(cell=>cell.addEventListener("click",()=>{
    const day=cell.dataset.day,mt=cell.dataset.mt,current=(S.meals[day]||{})[mt]||"";
    S.picker={day,mealType:mt,currentMeal:current};S.pickerInput="";render();
    setTimeout(()=>{const i=document.getElementById("pickerInp");if(i){i.focus();i.select();}},30);
  }));
  // Picker
  ov("pickerOv",()=>{S.picker=null;S.pickerInput="";render();});
  q("btnPickClose",()=>{S.picker=null;S.pickerInput="";render();});
  const pi=document.getElementById("pickerInp");
  if(pi){
    pi.addEventListener("input",()=>{S.pickerInput=pi.value;reRenderPicker();});
    pi.addEventListener("keydown",e=>{if(e.key==="Enter")addAndSelect();});
  }
  q("btnPickAdd",addAndSelect);
  document.querySelectorAll("[data-pick]").forEach(b=>b.addEventListener("click",()=>selectMeal(b.dataset.pick)));
  q("btnPickRm",()=>{const{day,mealType}=S.picker;if(S.meals[day])S.meals[day][mealType]="";saveMeals();S.picker=null;S.pickerInput="";render();});
  // Grocery
  document.querySelectorAll("[data-gi]").forEach(r=>r.addEventListener("click",()=>{S.groceryChecked[r.dataset.gi]=!S.groceryChecked[r.dataset.gi];lsSet("s_groceryChecked",S.groceryChecked);render();}));
  q("btnResetGroc",()=>{S.groceryChecked={};lsSet("s_groceryChecked",{});render();});
  // Recipe filters
  document.querySelectorAll("[data-rf]").forEach(b=>b.addEventListener("click",()=>{S.recipeFilter=b.dataset.rf;lsSet("s_recipeFilter",S.recipeFilter);render();}));
  // Recipe cards
  document.querySelectorAll("[data-rn]").forEach(h=>h.addEventListener("click",e=>{
    if(e.target.closest("[data-dr]")||e.target.closest("[data-er]"))return;
    S.recipeOpen[h.dataset.rn]=!S.recipeOpen[h.dataset.rn];lsSet("s_recipeOpen",S.recipeOpen);render();
  }));
  document.querySelectorAll("[data-dr]").forEach(b=>b.addEventListener("click",e=>{
    e.stopPropagation();delete S.uploadedRecipes[b.dataset.dr];lsSet("uploadedRecipes",S.uploadedRecipes);render();
  }));
  // Edit recipe
  document.querySelectorAll("[data-er]").forEach(b=>b.addEventListener("click",e=>{
    e.stopPropagation();
    const name=b.dataset.er;
    const allR=Object.assign({},RECIPES,S.uploadedRecipes);
    const r=allR[name];if(!r)return;
    S.editRecipeName=name;
    S.editForm={name,tag:r.tag,time:r.time,servings:r.servings,ingredients:[...(r.ingredients||[])],steps:[...(r.steps||[])]};
    S.showEdit=true;render();
  }));
  // Edit modal events
  ov("editOv",()=>{S.showEdit=false;S.editForm=null;render();});
  q("btnEditClose",()=>{S.showEdit=false;S.editForm=null;render();});
  q("btnEditCancel",()=>{S.showEdit=false;S.editForm=null;render();});
  // Live name-conflict warning
  const enEl=document.getElementById("editName");
  if(enEl)enEl.addEventListener("input",()=>{
    const v=enEl.value.trim();
    const allR=Object.assign({},RECIPES,S.uploadedRecipes);
    const conflict=v&&v!==S.editRecipeName&&allR[v];
    document.getElementById("editNameWarn").classList.toggle("show",!!conflict);
  });
  q("btnEditSave",()=>{
    const name=(document.getElementById("editName").value||"").trim();
    const tag=document.getElementById("editTag").value;
    const time=(document.getElementById("editTime").value||"").trim()||"вҖ”";
    const servings=parseInt(document.getElementById("editServings").value)||5;
    const ingredients=document.getElementById("editIngredients").value.split("\n").map(l=>l.trim()).filter(Boolean);
    const steps=document.getElementById("editSteps").value.split("\n").map(l=>l.trim()).filter(Boolean);
    if(!name)return;
    const allR=Object.assign({},RECIPES,S.uploadedRecipes);
    if(name!==S.editRecipeName&&allR[name])return; // conflict
    const updated={tag,time,servings,ingredients,steps,_uploaded:true};
    // Remove old entry if renamed
    if(name!==S.editRecipeName){
      // Remove from uploadedRecipes if it existed there
      delete S.uploadedRecipes[S.editRecipeName];
      // Update any meal plan cells that used the old name
      Object.keys(S.meals).forEach(day=>{
        Object.keys(S.meals[day]||{}).forEach(mt=>{
          if(S.meals[day][mt]===S.editRecipeName)S.meals[day][mt]=name;
        });
      });
      saveMeals();
      // Update recipeOpen
      if(S.recipeOpen[S.editRecipeName]){delete S.recipeOpen[S.editRecipeName];S.recipeOpen[name]=true;}
    }
    S.uploadedRecipes[name]=updated;
    lsSet("uploadedRecipes",S.uploadedRecipes);
    S.showEdit=false;S.editForm=null;S.editRecipeName=null;
    render();
  });
  // Upload
  q("btnShowUpload",()=>{S.showUpload=true;S.uploadText="";S.uploadPreview=null;S.uploadError="";render();});
  q("btnUploadClose",()=>{S.showUpload=false;render();});
  ov("uploadOv",()=>{S.showUpload=false;render();});
  q("btnChooseFile",()=>{const fi=document.getElementById("fileInp");if(fi)fi.click();});
  const fi=document.getElementById("fileInp");
  if(fi)fi.addEventListener("change",e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{S.uploadText=ev.target.result;S.uploadPreview=null;S.uploadError="";render();};r.readAsText(f);});
  const ta=document.getElementById("uploadTA");
  if(ta)ta.addEventListener("input",()=>{S.uploadText=ta.value;S.uploadPreview=null;S.uploadError="";});
  q("btnPreview",()=>{
    const result=parseRecipes(S.uploadText);
    if(!Object.keys(result).length){S.uploadError="Couldn't find any recipes. Make sure each recipe has a name on the first line, followed by numbered steps (1. 2. 3.)";S.uploadPreview=null;}
    else{S.uploadPreview=result;S.uploadError="";}
    render();
  });
  q("btnSaveUp",()=>{
    S.uploadedRecipes=Object.assign({},S.uploadedRecipes,S.uploadPreview);
    lsSet("uploadedRecipes",S.uploadedRecipes);
    S.showUpload=false;S.uploadPreview=null;S.uploadText="";render();
  });
}
 
function q(id,fn){const el=document.getElementById(id);if(el)el.addEventListener("click",fn);}
function ov(id,fn){const el=document.getElementById(id);if(el)el.addEventListener("click",e=>{if(e.target===el)fn();});}
 
function addAndSelect(){
  const val=(S.pickerInput||"").trim();if(!val)return;
  const mt=S.picker.mealType,list=S.customMeals[mt]||[];
  if(!list.includes(val)){S.customMeals[mt]=[...list,val];lsSet("customMeals",S.customMeals);}
  selectMeal(val);
}
function selectMeal(val){
  const{day,mealType}=S.picker;
  if(!S.meals[day])S.meals[day]={};
  S.meals[day][mealType]=val;saveMeals();
  S.picker=null;S.pickerInput="";render();
}
function reRenderPicker(){
  // Re-render just the picker suggestions without full page re-render for smooth typing
  const{day,mealType,currentMeal}=S.picker;const inp=S.pickerInput||"";
  const custom=S.customMeals[mealType]||[];
  const all=[...new Set([...MEAL_IDEAS[mealType],...custom])];
  const sugg=inp.trim()?all.filter(s=>s.toLowerCase().includes(inp.toLowerCase())):all;
  // update suggestions div
  const box=document.getElementById("pickerBox");if(!box)return;
  const divs=box.querySelectorAll(".sugg-btn,[data-pick],.sugg-lbl");divs.forEach(d=>d.remove());
  // Just do a full render, it's fast enough
  render();
  setTimeout(()=>{const i=document.getElementById("pickerInp");if(i){i.focus();i.setSelectionRange(inp.length,inp.length);}},0);
}
 
render();
</script>

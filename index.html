// ── SUPABASE CLIENT (flat fetch helpers) ─────────────────────────────────
const SB_HEADERS = {
  "apikey": SUPABASE_KEY,
  "Authorization": "Bearer " + SUPABASE_KEY,
  "Content-Type": "application/json"
};

async function dbSelect(table, query) {
  query = query || "*";
  const url = SUPABASE_URL + "/rest/v1/" + table + "?select=" + query;
  const r = await fetch(url, { headers: SB_HEADERS });
  if (!r.ok) { const t = await r.text(); console.error("dbSelect failed:", r.status, t); throw new Error(t); }
  return r.json();
}

async function dbUpsert(table, data, onConflict) {
  const url = onConflict
    ? SUPABASE_URL + "/rest/v1/" + table + "?on_conflict=" + onConflict
    : SUPABASE_URL + "/rest/v1/" + table;
  const h = Object.assign({}, SB_HEADERS, { "Prefer": "resolution=merge-duplicates,return=representation" });
  const r = await fetch(url, { method: "POST", headers: h, body: JSON.stringify(data) });
  if (!r.ok) { const t = await r.text(); console.error("dbUpsert failed:", r.status, t); throw new Error(t); }
  return r.json();
}

async function dbDelete(table, filters) {
  let url = SUPABASE_URL + "/rest/v1/" + table + "?";
  for (const k in filters) url += k + "=eq." + encodeURIComponent(filters[k]) + "&";
  const r = await fetch(url, { method: "DELETE", headers: SB_HEADERS });
  if (!r.ok) { const t = await r.text(); console.error("dbDelete failed:", r.status, t); throw new Error(t); }
  return true;
}

// ── LOCAL STORAGE FALLBACK ────────────────────────────────────────────────
function lsGet(k,fb){try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):fb;}catch{return fb;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

// ── WEEK HELPERS ──────────────────────────────────────────────────────────
function getMonday(off){const n=new Date(),m=new Date(n);m.setDate(n.getDate()-((n.getDay()+6)%7)+off*7);m.setHours(0,0,0,0);return m;}
function weekKey(off){return getMonday(off).toISOString().slice(0,10);}
function weekLabel(off){const m=getMonday(off),s=new Date(m);s.setDate(m.getDate()+6);const f=d=>d.toLocaleDateString("en-US",{month:"short",day:"numeric"});return `${f(m)} – ${f(s)}`;}
function weekTitle(off){if(off===0)return"This Week";if(off===1)return"Next Week";if(off===-1)return"Last Week";return"Week of "+weekLabel(off).split("–")[0].trim();}

// ── STATE ─────────────────────────────────────────────────────────────────
const S={
  tab:          lsGet("s_tab","planner"),
  weekOffset:   lsGet("s_weekOffset",0),
  meals:{},
  allWeekMeals:{}, // cache of all weeks loaded from supabase for history
  customMeals:  lsGet("customMeals",{breakfast:[],lunch:[],dinner:[],snacks:[]}),
  uploadedRecipes: {},  // loaded from Supabase on init
  picker:null, pickerInput:"",
  showHistory:false, historyOpen:{},
  showUpload:false, uploadText:"", uploadPreview:null, uploadError:"",
  uploadSaving:false,
  recipeEdit: null, // { originalName, wasUploaded, name, tag, time, servings, ingText, stepText, saving, err }
  recipeOpen:   lsGet("s_recipeOpen",{}),
  recipeFilter: lsGet("s_recipeFilter","all"),
  groceryChecked: lsGet("s_groceryChecked",{}),
  /** Built-in recipe names the user removed from the list (not stored in cloud). */
  hiddenBuiltins: (function() {
    const h = lsGet("s_hiddenBuiltins", null);
    if (h == null) return {};
    if (Array.isArray(h)) { const o = {}; h.forEach(n => { o[n] = true; }); return o; }
    return typeof h === "object" ? h : {};
  })(),
  syncStatus: "loading", // "loading" | "ok" | "error"
  syncMsg: "Connecting…"
};

// Merged list: default recipes minus hidden, then uploaded (uploaded wins on name clash).
function allRecipesMerged() {
  const o = {};
  for (const k in RECIPES) {
    if (S.hiddenBuiltins[k] && !S.uploadedRecipes[k]) continue;
    o[k] = RECIPES[k];
  }
  return Object.assign(o, S.uploadedRecipes);
}

// ── SUPABASE SYNC FUNCTIONS ───────────────────────────────────────────────

// Load all uploaded recipes from Supabase
async function loadRecipesFromDB() {
  try {
    const rows = await dbSelect("recipes");
    const result = {};
    for (const row of rows) {
      result[row.name] = {
        tag: row.tag,
        time: row.time,
        servings: row.servings,
        ingredients: row.ingredients || [],
        steps: row.steps || [],
        _uploaded: true
      };
    }
    S.uploadedRecipes = result;
    // Also mirror to localStorage as fallback
    lsSet("uploadedRecipes", result);
  } catch(e) {
    console.warn("Supabase recipe load failed, using localStorage fallback:", e);
    S.uploadedRecipes = lsGet("uploadedRecipes", {});
  }
}

// Save a recipe to Supabase
async function saveRecipeToDB(name, recipe) {
  const payload = {
    name,
    tag: recipe.tag,
    time: recipe.time,
    servings: recipe.servings,
    ingredients: recipe.ingredients,
    steps: recipe.steps
  };
  try {
    // Preferred path when recipes.name has a unique constraint.
    await dbUpsert("recipes", payload, "name");
    setSyncOk();
    return { ok: true };
  } catch(e) {
    const msg = String((e && e.message) || e || "");
    const missingConflictConstraint =
      msg.includes("42P10") ||
      /no unique|no exclusion|on conflict/i.test(msg);
    if (missingConflictConstraint) {
      try {
        // Fallback for schemas without unique(name): replace by name manually.
        await dbDelete("recipes", { name });
      } catch {}
      try {
        await dbUpsert("recipes", payload);
        setSyncOk();
        return { ok: true };
      } catch (fallbackErr) {
        console.warn("Recipe fallback save failed:", fallbackErr);
        const fallbackMsg = String((fallbackErr && fallbackErr.message) || fallbackErr || "");
        setSyncErr("Recipe save failed — saved locally only");
        return { ok: false, error: fallbackMsg || "Unknown fallback error" };
      }
    }
    console.warn("Recipe save failed:", e);
    setSyncErr("Recipe save failed — saved locally only");
    return { ok: false, error: msg || "Unknown save error" };
  }
}

// Delete a recipe from Supabase
async function deleteRecipeFromDB(name) {
  try {
    await dbDelete("recipes", { name });
    setSyncOk();
  } catch(e) {
    console.warn("Recipe delete failed:", e);
    setSyncErr("Delete failed — refresh to re-sync");
  }
}

function openRecipeEdit(name) {
  const all = allRecipesMerged();
  const r = all[name];
  if (!r) return;
  S.recipeEdit = {
    originalName: name,
    wasUploaded: !!S.uploadedRecipes[name],
    name,
    tag: r.tag || "dinner",
    time: r.time != null ? String(r.time) : "—",
    servings: r.servings != null && !isNaN(r.servings) ? r.servings : 5,
    ingText: (r.ingredients || []).join("\n"),
    stepText: (r.steps || []).join("\n"),
    saving: false,
    err: ""
  };
  render();
}

function collectMealSlotsWithName(n) {
  const seen = new Set();
  const out = [];
  const push = (wk, day, mt) => {
    const k = wk + "|" + day + "|" + mt;
    if (seen.has(k)) return;
    seen.add(k);
    out.push({ wk, day, meal_type: mt });
  };
  const curWk = weekKey(S.weekOffset);
  for (const day of Object.keys(S.meals || {})) {
    for (const mt of MEAL_TYPES) {
      if (S.meals[day] && S.meals[day][mt] === n) push(curWk, day, mt);
    }
  }
  for (const wk of Object.keys(S.allWeekMeals || {})) {
    for (const day of Object.keys(S.allWeekMeals[wk] || {})) {
      for (const mt of MEAL_TYPES) {
        if (S.allWeekMeals[wk] && S.allWeekMeals[wk][day] && S.allWeekMeals[wk][day][mt] === n) {
          push(wk, day, mt);
        }
      }
    }
  }
  return out;
}

function replaceMealNameInLocalPlans(oldName, newName) {
  if (oldName === newName) return;
  for (const day of Object.keys(S.meals || {})) {
    for (const mt of MEAL_TYPES) {
      if (S.meals[day] && S.meals[day][mt] === oldName) S.meals[day][mt] = newName;
    }
  }
  for (const wk of Object.keys(S.allWeekMeals || {})) {
    for (const day of Object.keys(S.allWeekMeals[wk] || {})) {
      for (const mt of MEAL_TYPES) {
        if (S.allWeekMeals[wk] && S.allWeekMeals[wk][day] && S.allWeekMeals[wk][day][mt] === oldName) {
          S.allWeekMeals[wk][day][mt] = newName;
        }
      }
    }
  }
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith("week:")) {
      const data = lsGet(k, null);
      if (!data) continue;
      let ch = false;
      for (const day of Object.keys(data)) {
        for (const mt of MEAL_TYPES) {
          if (data[day] && data[day][mt] === oldName) { data[day][mt] = newName; ch = true; }
        }
      }
      if (ch) lsSet(k, data);
    }
  }
  for (const mt of MEAL_TYPES) {
    const list = S.customMeals[mt] || [];
    if (list.some(x => x === oldName)) {
      S.customMeals[mt] = list.map(x => x === oldName ? newName : x);
    }
  }
  lsSet("customMeals", S.customMeals);
  if (S.recipeOpen[oldName]) {
    S.recipeOpen[newName] = S.recipeOpen[oldName];
    delete S.recipeOpen[oldName];
  }
}

async function saveEditedRecipe() {
  const e = S.recipeEdit;
  if (!e || e.saving) return;
  const nEl = document.getElementById("reName");
  const tEl = document.getElementById("reTag");
  const timeEl = document.getElementById("reTime");
  const sEl = document.getElementById("reServ");
  const iEl = document.getElementById("reIng");
  const stEl = document.getElementById("reSteps");
  const newName = (nEl && nEl.value || "").trim();
  const tag = tEl && tEl.value || "dinner";
  const time = (timeEl && timeEl.value || "").trim() || "—";
  const servings = parseInt(sEl && sEl.value, 10) || 5;
  const ingText = (iEl && iEl.value) || "";
  const stepText = (stEl && stEl.value) || "";
  if (!newName) {
    e.err = "Recipe name is required.";
    render();
    return;
  }
  const ingredients = ingText.split("\n").map(s => s.trim()).filter(Boolean);
  const steps = stepText.split("\n").map(s => s.trim()).filter(Boolean);
  if (!ingredients.length && !steps.length) {
    e.err = "Add at least one ingredient or one step.";
    render();
    return;
  }
  e.saving = true;
  e.err = "";
  render();

  const oldName = e.originalName;
  const wasUploaded = e.wasUploaded;
  const recipe = { tag, time, servings, ingredients, steps, _uploaded: true };
  const slots = newName !== oldName ? collectMealSlotsWithName(oldName) : [];

  const res = await saveRecipeToDB(newName, recipe);
  if (!res.ok) {
    e.saving = false;
    e.err = (res.error || "Could not save to cloud.").replace(/\s+/g, " ").trim();
    if (e.err.length > 300) e.err = e.err.slice(0, 300) + "…";
    setSyncErr("Recipe not fully synced");
    render();
    updateSyncBadge();
    return;
  }

  if (wasUploaded && newName !== oldName) {
    await deleteRecipeFromDB(oldName);
  }
  S.uploadedRecipes[newName] = recipe;
  if (newName !== oldName) delete S.uploadedRecipes[oldName];
  lsSet("uploadedRecipes", S.uploadedRecipes);

  if (newName !== oldName) {
    replaceMealNameInLocalPlans(oldName, newName);
    saveMeals();
    for (const s of slots) {
      await saveMealToDB(s.day, s.meal_type, newName, s.wk);
    }
  }

  e.saving = false;
  S.recipeEdit = null;
  setSyncOk();
  render();
  updateSyncBadge();
}

// Load meals for current week from Supabase
async function loadMealsFromDB() {
  const wk = weekKey(S.weekOffset);
  try {
    const rows = await dbSelect("meal_plans");
    // Rebuild allWeekMeals from all rows
    S.allWeekMeals = {};
    for (const row of rows) {
      if (!S.allWeekMeals[row.week_key]) S.allWeekMeals[row.week_key] = {};
      if (!S.allWeekMeals[row.week_key][row.day]) S.allWeekMeals[row.week_key][row.day] = {};
      S.allWeekMeals[row.week_key][row.day][row.meal_type] = row.meal_name || "";
    }
    S.meals = S.allWeekMeals[wk] || {};
    // Mirror to localStorage
    lsSet("week:"+wk, S.meals);
    setSyncOk();
  } catch(e) {
    console.warn("Meal plan load failed, using localStorage:", e);
    S.meals = lsGet("week:"+wk, {});
  }
}

// Save a single meal slot to Supabase (optionally for a specific week key string, e.g. renames)
async function saveMealToDB(day, mealType, mealName, weekKeyOverride) {
  const wk = weekKeyOverride !== undefined ? weekKeyOverride : weekKey(S.weekOffset);
  try {
    if (mealName) {
      await dbUpsert("meal_plans", {
        week_key: wk,
        day,
        meal_type: mealType,
        meal_name: mealName,
        updated_at: new Date().toISOString()
      }, "week_key,day,meal_type");
    } else {
      // Empty meal — delete the row
      await dbDelete("meal_plans", {
        week_key: wk,
        day,
        meal_type: mealType
      });
    }
    setSyncOk();
  } catch(e) {
    console.warn("Meal save failed:", e);
    setSyncErr("Meal save failed — saved locally only");
  }
}

// Load custom meals from Supabase
async function loadCustomMealsFromDB() {
  try {
    const rows = await dbSelect("custom_meals");
    const result = {breakfast:[],lunch:[],dinner:[],snacks:[]};
    for (const row of rows) {
      if (result[row.meal_type]) result[row.meal_type].push(row.name);
    }
    S.customMeals = result;
    lsSet("customMeals", result);
  } catch(e) {
    console.warn("Custom meals load failed, using localStorage:", e);
    S.customMeals = lsGet("customMeals", {breakfast:[],lunch:[],dinner:[],snacks:[]});
  }
}

// Save a custom meal to Supabase
async function saveCustomMealToDB(mealType, name) {
  try {
    await dbUpsert("custom_meals", { meal_type: mealType, name }, "meal_type,name");
  } catch(e) {
    console.warn("Custom meal save failed:", e);
  }
}

// ── INGREDIENT AGGREGATION ────────────────────────────────────────────────
const FRAC={"½":0.5,"⅓":1/3,"⅔":2/3,"¼":0.25,"¾":0.75,"⅛":0.125,"⅜":0.375,"⅝":0.625,"⅞":0.875,"1/2":0.5,"1/3":1/3,"2/3":2/3,"1/4":0.25,"3/4":0.75,"1/8":0.125,"3/8":0.375,"5/8":0.625,"7/8":0.875};
const UNIT_ALIAS={cup:"cup",cups:"cup",c:"cup",tablespoon:"tbsp",tablespoons:"tbsp",tbsp:"tbsp",tbs:"tbsp",tb:"tbsp",teaspoon:"tsp",teaspoons:"tsp",tsp:"tsp",pound:"lb",pounds:"lb",lb:"lb",lbs:"lb",ounce:"oz",ounces:"oz",oz:"oz",clove:"clove",cloves:"clove",slice:"slice",slices:"slice",can:"can",cans:"can",jar:"jar",jars:"jar",packet:"packet",packets:"packet",stalk:"stalk",stalks:"stalk",bag:"bag",bags:"bag",container:"container",containers:"container",multipack:"multipack",head:"head",heads:"head",bunch:"bunch",bunches:"bunch"};

function parseFrac(s){
  if(!s)return null;s=s.trim();
  if(FRAC[s]!==undefined)return FRAC[s];
  if(/^\d+$/.test(s))return parseFloat(s);
  if(/^\d+\.\d+$/.test(s))return parseFloat(s);
  const muf=s.match(/^(\d+)\s*([\u00BC-\u00BE\u2150-\u215E½⅓⅔¼¾⅛⅜⅝⅞]+)$/);
  if(muf&&FRAC[muf[2]]!==undefined)return parseInt(muf[1])+FRAC[muf[2]];
  const msf=s.match(/^(\d+)\s+(\d+\/\d+)$/);
  if(msf&&FRAC[msf[2]]!==undefined)return parseInt(msf[1])+FRAC[msf[2]];
  const sf=s.match(/^(\d+)\/(\d+)$/);
  if(sf)return parseInt(sf[1])/parseInt(sf[2]);
  return null;
}
function formatQty(n){
  if(n===null||n===undefined)return"";
  const FV=[0.5,1/3,2/3,0.25,0.75,0.125,0.375,0.625,0.875];
  const FS={"0.5":"½","0.3333":"⅓","0.6667":"⅔","0.25":"¼","0.75":"¾","0.125":"⅛","0.375":"⅜","0.625":"⅝","0.875":"⅞"};
  const whole=Math.floor(n);const rem=n-whole;
  for(const v of FV){if(Math.abs(rem-v)<0.02){const k=v===1/3?"0.3333":v===2/3?"0.6667":String(v);const f=FS[k];if(f)return whole>0?`${whole}${f}`:f;}}
  if(Number.isInteger(n))return String(n);
  return parseFloat(n.toFixed(2)).toString();
}
function parseIngredientLine(line){
  let s=line.trim().replace(/^[-•]\s*/,"");if(!s)return null;
  let qty=null,unit=null;
  const qm=s.match(/^([\d½⅓⅔¼¾⅛⅜⅝⅞]+(?:\s*[\d\/½⅓⅔¼¾⅛⅜⅝⅞]+)?)\s*/);
  if(qm){const p=parseFrac(qm[1].trim());if(p!==null){qty=p;s=s.slice(qm[0].length);}}
  const unitRe=new RegExp("^("+Object.keys(UNIT_ALIAS).join("|")+")s?\\b\\.?\\s*","i");
  const um=s.match(unitRe);
  if(um){unit=UNIT_ALIAS[um[1].toLowerCase()]||um[1].toLowerCase();s=s.slice(um[0].length);}
  let name=s.trim().replace(/\(.*?\)/g,"").trim().replace(/,.*$/,"").trim().toLowerCase().replace(/^(of|for|the|a|an)\s+/i,"").trim();
  if(!name)return null;
  return{qty,unit,name,raw:line.trim()};
}
function aggregateIngredients(mealNames){
  const allRecipes=allRecipesMerged();
  const map={};
  mealNames.forEach(mealName=>{
    const recipe=allRecipes[mealName];if(!recipe||!recipe.ingredients)return;
    recipe.ingredients.forEach(line=>{
      const parsed=parseIngredientLine(line);if(!parsed)return;
      const key=parsed.name;
      if(!map[key])map[key]={name:parsed.name,qty:null,unit:parsed.unit,rawLines:[],recipes:[]};
      const entry=map[key];
      if(parsed.qty!==null){
        const sameUnit=(entry.unit||null)===(parsed.unit||null);
        if(sameUnit){entry.qty=(entry.qty||0)+parsed.qty;}
        else if(entry.qty===null){entry.qty=parsed.qty;entry.unit=parsed.unit;}
        else{entry.qty=null;entry.unit=null;entry.ambiguous=true;}
      }
      entry.rawLines.push(line);
      if(!entry.recipes.includes(mealName))entry.recipes.push(mealName);
    });
  });
  return Object.values(map).map(e=>{
    let display;
    if(e.ambiguous||e.qty===null){display=capitalize(e.name)+(e.rawLines.length>1?" (see recipes)":"");}
    else{const q=formatQty(e.qty);const u=e.unit?(e.qty>1&&e.unit!=="oz"&&e.unit!=="lb"?pluralUnit(e.unit):e.unit):"";display=(q?q+" ":"")+(u?u+" ":"")+capitalize(e.name);}
    return{key:e.name,display,recipes:e.recipes};
  }).sort((a,b)=>a.display.localeCompare(b.display));
}
function pluralUnit(u){const m={cup:"cups",tbsp:"tbsp",tsp:"tsp",lb:"lbs",oz:"oz",clove:"cloves",slice:"slices",can:"cans",jar:"jars",packet:"packets",stalk:"stalks",bag:"bags",container:"containers",head:"heads",bunch:"bunches"};return m[u]||u;}
function capitalize(s){return s?s.charAt(0).toUpperCase()+s.slice(1):s;}

              :`<button class="btn-primary" id="btnSaveUp" ${S.uploadSaving?"disabled":""}>${S.uploadSaving?"Saving...":"☁️ Save "+Object.keys(prev).length+" Recipes to Cloud"}</button>`}
        <button class="btn-secondary" id="btnUploadClose">Cancel</button>
      </div>
    </div>
  </div>`;
}

  if (!e) return "";
  const tags = ["breakfast", "lunch", "dinner", "snacks"];
  return `<div class="overlay" id="reOv">
    <div class="modal wide">
      <div>
        <div style="font-size:20px;font-weight:800;color:#292524;margin-bottom:4px">✎ Edit recipe</div>
        <div class="edit-hint">${e.wasUploaded ? "Changes sync to the cloud when you save." : "Saves a copy to your library (and cloud) — built-in recipes stay unchanged until you do."}</div>
      </div>
      <div>
        <div class="edit-field-lbl" style="margin-bottom:6px">Name</div>
        <input class="edit-inp" id="reName" value="${esc(e.name)}" ${e.saving ? "disabled" : ""} autocomplete="off"/>
      </div>
      <div>
        <div class="edit-field-lbl" style="margin-bottom:6px">Category</div>
        <select class="edit-sel" id="reTag" ${e.saving ? "disabled" : ""}>
          ${tags.map(t => `<option value="${t}"${e.tag === t ? " selected" : ""}>${t}</option>`).join("")}
        </select>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div>
          <div class="edit-field-lbl" style="margin-bottom:6px">Time</div>
          <input class="edit-inp" id="reTime" value="${esc(e.time)}" ${e.saving ? "disabled" : ""} placeholder="e.g. 35 min"/>
        </div>
        <div>
          <div class="edit-field-lbl" style="margin-bottom:6px">Serves</div>
          <input class="edit-inp" id="reServ" type="number" min="1" value="${e.servings}" ${e.saving ? "disabled" : ""}/>
        </div>
      </div>
      <div>
        <div class="edit-field-lbl" style="margin-bottom:6px">Ingredients <span class="edit-hint">(one per line)</span></div>
        <textarea class="edit-ta" id="reIng" ${e.saving ? "disabled" : ""}>${esc(e.ingText)}</textarea>
      </div>
      <div>
        <div class="edit-field-lbl" style="margin-bottom:6px">Steps <span class="edit-hint">(one per line)</span></div>
        <textarea class="edit-ta" id="reSteps" style="min-height:120px" ${e.saving ? "disabled" : ""}>${esc(e.stepText)}</textarea>
      </div>
      ${e.err ? `<div class="edit-err">${esc(e.err)}</div>` : ""}
      <div class="btn-row">
        <button class="btn-primary" id="btnReSave" type="button" ${e.saving ? "disabled" : ""}>${e.saving ? "Saving…" : "☁️ Save recipe"}</button>
        <button class="btn-secondary" id="btnReCancel" type="button" ${e.saving ? "disabled" : ""}>Cancel</button>
      </div>
    </div>
  </div>`;
}

// ── PARSE RECIPE TEXT ─────────────────────────────────────────────────────
function parseRecipes(text){
  const blocks=text.split(/\n{2,}/).map(b=>b.trim()).filter(Boolean);
  const out={};
  let lastRecipeName=null;
  const isSectionLikeName=n=>/^(ingredients?|ingredient list|preparation|prep|directions|steps?|instructions?)\s*:?\s*$/i.test(n||"");
  const isMetaLikeName=n=>/^(time|serves|servings|category|type|meal)\s*:/i.test(n||"");
  blocks.forEach(block=>{
    const lines=block.split("\n").map(l=>l.trim()).filter(Boolean);
    if(lines.length<2)return;
    const name=lines[0];let time="—",servings=5,tag="dinner";const steps=[];const ingredients=[];
    if(isMetaLikeName(name))return;
    let inIngredients=false;
    let inPreparation=false;
    lines.slice(1).forEach(line=>{
      const lo=line.toLowerCase();
      if(lo.startsWith("time:")){time=line.split(":").slice(1).join(":").trim();return;}
      if(lo.startsWith("serves:")||lo.startsWith("servings:")){servings=parseInt(line.split(":")[1])||5;return;}
      if(lo.startsWith("category:")||lo.startsWith("type:")||lo.startsWith("meal:")){
        const v=line.split(":")[1].trim().toLowerCase();
        if(["breakfast","lunch","dinner","snacks"].includes(v))tag=v;return;
      }
      if(lo==="ingredients"||lo==="ingredients:"){inIngredients=true;inPreparation=false;return;}
      if(
        lo==="preparation"||lo==="preparation:"||lo==="prep"||lo==="prep:"||
        lo==="directions"||lo==="directions:"||lo==="instructions"||lo==="instructions:"||
        lo==="steps"||lo==="steps:"
      ){
        inIngredients=false;
        inPreparation=true;
        return;
      }
      const sm=line.match(/^\d+[\.\)]\s+(.+)/);
      if(sm){inIngredients=false;inPreparation=true;steps.push(sm[1]);return;}
      if(/^\s*step\s*\d+\s*:/i.test(line)){
        inIngredients=false;
        inPreparation=true;
        steps.push(line.replace(/^\s*step\s*\d+\s*:\s*/i,""));
        return;
      }
      if(line.startsWith("-")||line.startsWith("•")){
        const val=line.replace(/^[-•]\s*/,"");
        if(inPreparation)steps.push(val);
        else ingredients.push(val);
        return;
      }
      // Accept plain, non-bulleted lines under Ingredients.
      if(inIngredients){
        ingredients.push(line);
        return;
      }
      // Typed recipes often have plain lines under Preparation without numbering.
      if(!inIngredients) {
        steps.push(line);
      }
    });
    if(steps.length===0&&ingredients.length===0){
      lastRecipeName=name;
      if(!isSectionLikeName(name)&&!isMetaLikeName(name)&&!out[name]){
        out[name]={tag,time,servings,ingredients:[],steps:[],_uploaded:true};
      }
      return;
    }

    if(isSectionLikeName(name)){
      const mergeTarget=lastRecipeName||Object.keys(out).pop();
      if(mergeTarget&&out[mergeTarget]){
        const isPrep=/^(preparation|prep|directions|instructions|steps?)\s*:?\s*$/i.test(name);
        if(isPrep){
          out[mergeTarget].steps=out[mergeTarget].steps.concat(ingredients).concat(steps);
        } else {
          out[mergeTarget].ingredients=out[mergeTarget].ingredients.concat(ingredients).concat(steps);
        }
      }
      return;
    }

    if(out[name]){
      out[name].ingredients=out[name].ingredients.concat(ingredients);
      out[name].steps=out[name].steps.concat(steps);
      if(out[name].time==="—"&&time!=="—")out[name].time=time;
      if((out[name].servings===5||!out[name].servings)&&servings)out[name].servings=servings;
      if(out[name].tag==="dinner"&&tag!=="dinner")out[name].tag=tag;
    } else {
      out[name]={tag,time,servings,ingredients,steps,_uploaded:true};
    }
    lastRecipeName=name;
  });
  return out;
}

// ── BIND EVENTS ───────────────────────────────────────────────────────────
function bind(){
  document.querySelectorAll("[data-tab]").forEach(b=>b.addEventListener("click",()=>{S.tab=b.dataset.tab;lsSet("s_tab",S.tab);render();}));
  q("btnPrev",async ()=>{S.weekOffset--;lsSet("s_weekOffset",S.weekOffset);await loadMealsFromDB();render();});
  q("btnNext",async ()=>{S.weekOffset++;lsSet("s_weekOffset",S.weekOffset);await loadMealsFromDB();render();});
  q("btnHist",()=>{S.showHistory=true;render();});
  q("btnHistClose",()=>{S.showHistory=false;render();});
  ov("histOv",()=>{S.showHistory=false;render();});
  document.querySelectorAll("[data-hk]").forEach(el=>el.addEventListener("click",()=>{S.historyOpen[el.dataset.hk]=!S.historyOpen[el.dataset.hk];render();}));
  document.querySelectorAll(".meal-cell").forEach(cell=>cell.addEventListener("click",()=>{
    const day=cell.dataset.day,mt=cell.dataset.mt,current=(S.meals[day]||{})[mt]||"";
    S.picker={day,mealType:mt,currentMeal:current};S.pickerInput="";render();
    setTimeout(()=>{const i=document.getElementById("pickerInp");if(i){i.focus();i.select();}},30);
  }));
  ov("pickerOv",()=>{S.picker=null;S.pickerInput="";render();});
  q("btnPickClose",()=>{S.picker=null;S.pickerInput="";render();});
  const pi=document.getElementById("pickerInp");
  if(pi){
    pi.addEventListener("input",()=>{S.pickerInput=pi.value;reRenderPicker();});
    pi.addEventListener("keydown",e=>{if(e.key==="Enter")addAndSelect();});
  }
  q("btnPickAdd",addAndSelect);
  document.querySelectorAll("[data-pick]").forEach(b=>b.addEventListener("click",()=>selectMeal(b.dataset.pick)));
  q("btnPickRm",()=>{
    const{day,mealType}=S.picker;
    if(S.meals[day])S.meals[day][mealType]="";
    saveMeals();
    saveMealToDB(day, mealType, ""); // async, non-blocking
    S.picker=null;S.pickerInput="";render();
  });
  document.querySelectorAll("[data-gi]").forEach(r=>r.addEventListener("click",()=>{S.groceryChecked[r.dataset.gi]=!S.groceryChecked[r.dataset.gi];lsSet("s_groceryChecked",S.groceryChecked);render();}));
  q("btnResetGroc",()=>{S.groceryChecked={};lsSet("s_groceryChecked",{});render();});
  document.querySelectorAll("[data-rf]").forEach(b=>b.addEventListener("click",()=>{S.recipeFilter=b.dataset.rf;lsSet("s_recipeFilter",S.recipeFilter);render();}));
  document.querySelectorAll("[data-rn]").forEach(h=>h.addEventListener("click",e=>{
    if(e.target.closest("[data-dr]"))return;
    S.recipeOpen[h.dataset.rn]=!S.recipeOpen[h.dataset.rn];lsSet("s_recipeOpen",S.recipeOpen);render();
  }));
  document.querySelectorAll(".rec-actions").forEach(a=>a.addEventListener("click",e=>e.stopPropagation()));
  document.querySelectorAll("[data-re-edit]").forEach(b=>b.addEventListener("click",e=>{
    e.stopPropagation();
    e.preventDefault();
    const n=b.getAttribute("data-re-edit");
    if(n)openRecipeEdit(n);
  }));
  q("btnReSave",()=>{saveEditedRecipe();});
  q("btnReCancel",()=>{if(S.recipeEdit&&S.recipeEdit.saving)return;S.recipeEdit=null;render();});
  ov("reOv",()=>{if(S.recipeEdit&&S.recipeEdit.saving)return;S.recipeEdit=null;render();});
  if(S.recipeEdit)setTimeout(()=>{const n=document.getElementById("reName");if(n){n.focus();n.select();}},0);
  document.querySelectorAll("[data-dr]").forEach(b=>b.addEventListener("click",e=>{
    e.stopPropagation();
    const name = b.getAttribute("data-dr");
    if (!name) return;
    if (S.uploadedRecipes[name]) {
      delete S.uploadedRecipes[name];
      lsSet("uploadedRecipes",S.uploadedRecipes);
      deleteRecipeFromDB(name);
    } else {
      S.hiddenBuiltins[name] = true;
      lsSet("s_hiddenBuiltins",S.hiddenBuiltins);
    }
    delete S.recipeOpen[name];
    lsSet("s_recipeOpen",S.recipeOpen);
    render();
  }));
  q("btnShowUpload",()=>{S.showUpload=true;S.uploadText="";S.uploadPreview=null;S.uploadError="";S.uploadSaving=false;render();});
  q("btnUploadClose",()=>{if(S.uploadSaving)return;S.showUpload=false;S.uploadSaving=false;render();});
  ov("uploadOv",()=>{if(S.uploadSaving)return;S.showUpload=false;S.uploadSaving=false;render();});
  q("btnChooseFile",()=>{const fi=document.getElementById("fileInp");if(fi)fi.click();});
  const fi=document.getElementById("fileInp");
  if(fi)fi.addEventListener("change",e=>{
    const f=e.target.files[0];
    if(!f)return;
    const isPdf=f.type==="application/pdf"||f.name.toLowerCase().endsWith(".pdf");
    if(isPdf){
      S.uploadText="";
      S.uploadPreview=null;
      S.uploadError="Reading PDF…";
      render();
      (async ()=>{
        try{
          if(typeof pdfjsLib==="undefined")throw new Error("pdfjs missing");
          const buf=await f.arrayBuffer();
          const pdf=await pdfjsLib.getDocument({data:buf}).promise;
          const pageTexts=[];
          for(let p=1;p<=pdf.numPages;p++){
            const page=await pdf.getPage(p);
            const tc=await page.getTextContent();
            pageTexts.push(tc.items.map(it=>it.str).join(" "));
          }
          const fullText=pageTexts.join("\n");
          if(!fullText.trim()){
            S.uploadText="";
            S.uploadPreview=null;
            S.uploadError="Couldn't read this PDF. Try copying and pasting the text instead.";
          }else{
            S.uploadText=fullText;
            S.uploadPreview=null;
            S.uploadError="";
          }
        }catch(err){
          S.uploadText="";
          S.uploadPreview=null;
          S.uploadError="Couldn't read this PDF. Try copying and pasting the text instead.";
        }
        render();
      })();
    }else{
      const r=new FileReader();
      r.onload=ev=>{S.uploadText=ev.target.result;S.uploadPreview=null;S.uploadError="";render();};
      r.readAsText(f);
    }
    fi.value="";
  });
  const ta=document.getElementById("uploadTA");
  const fitUploadTA=()=>{
    if(!ta)return;
    ta.style.height="auto";
    const target=Math.min(420,Math.max(160,ta.scrollHeight));
    ta.style.height=target+"px";
    ta.style.overflowY=ta.scrollHeight>420?"auto":"hidden";
  };
  if(ta)ta.addEventListener("input",()=>{
    S.uploadText=ta.value;
    S.uploadPreview=null;
    S.uploadError="";
    fitUploadTA();
    const btn=document.getElementById("btnPreview");
    if(btn)btn.disabled=!S.uploadText.trim();
  });
  fitUploadTA();
  q("btnPreview",()=>{
    const result=parseRecipes(S.uploadText);
    if(!Object.keys(result).length){S.uploadError="Couldn't find any recipes. Use a name on line 1, then add Ingredients and/or Preparation lines.";S.uploadPreview=null;}
    else{S.uploadPreview=result;S.uploadError="";}
    render();
  });
  q("btnSaveUp",async ()=>{
    if(S.uploadSaving)return;
    const prev = S.uploadPreview || {};
    const entries = Object.entries(prev);
    if(!entries.length)return;
    S.uploadSaving=true;
    S.uploadError="";
    render();

    const saved = {};
    const failed = [];
    for (const [name, recipe] of entries) {
      const result = await saveRecipeToDB(name, recipe);
      if(result.ok) saved[name] = recipe;
      else failed.push({ name, error: (result.error || "").replace(/\s+/g, " ").trim() });
    }

    if(Object.keys(saved).length){
      S.uploadedRecipes=Object.assign({},S.uploadedRecipes,saved);
      lsSet("uploadedRecipes",S.uploadedRecipes);
    }

    S.uploadSaving=false;
    if(failed.length===0){
      S.showUpload=false;
      S.uploadPreview=null;
      S.uploadText="";
      S.uploadError="";
    } else {
      const first = failed[0];
      const trimmedErr = first.error.length > 220 ? (first.error.slice(0,220) + "...") : first.error;
      S.uploadError=`Saved ${Object.keys(saved).length} to cloud. ${failed.length} failed. First error (${first.name}): ${trimmedErr || "unknown Supabase error"}`;
      console.warn("Recipe cloud save failures:", failed);
    }
    render();
    updateSyncBadge();
  });
}

function q(id,fn){const el=document.getElementById(id);if(el)el.addEventListener("click",fn);}
function ov(id,fn){const el=document.getElementById(id);if(el)el.addEventListener("click",e=>{if(e.target===el)fn();});}

function addAndSelect(){
  const val=(S.pickerInput||"").trim();if(!val)return;
  const mt=S.picker.mealType,list=S.customMeals[mt]||[];
  if(!list.includes(val)){
    S.customMeals[mt]=[...list,val];
    lsSet("customMeals",S.customMeals);
    saveCustomMealToDB(mt, val); // async, non-blocking
  }
  selectMeal(val);
}

function selectMeal(val){
  const{day,mealType}=S.picker;
  if(!S.meals[day])S.meals[day]={};
  S.meals[day][mealType]=val;
  saveMeals();
  saveMealToDB(day, mealType, val); // async, non-blocking
  S.picker=null;S.pickerInput="";render();
}

function reRenderPicker(){
  render();
  setTimeout(()=>{const i=document.getElementById("pickerInp");if(i){i.focus();i.setSelectionRange(S.pickerInput.length,S.pickerInput.length);}},0);
}

// ── START ─────────────────────────────────────────────────────────────────
init();
</script>
